    <script src="vendor/marked.min.js"></script>
    <script src="vendor/docx.js"></script>
    <script src="vendor/paged.polyfill.js"></script>
    <script src="js/diagram.js"></script>
    <script src="js/templates/clean.js"></script>

  </head>
  <body>
    <div id='bar'>
      <span class='brand'>
        <svg class='brand-mark' width='30' height='30' viewBox='0 0 48 48' xmlns='http://www.w3.org/2000/svg' aria-hidden='true'>
          <rect x='1' y='1' width='46' height='46' rx='12' fill='#2563eb'/>
          <path d='M10 33 V18 L20 28 L30 18 V33' fill='none' stroke='#fff' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>
          <path class='spark big' d='M36.5 8 C36.5 12.8 38.7 15 43.5 15 C38.7 15 36.5 17.2 36.5 22 C36.5 17.2 34.3 15 29.5 15 C34.3 15 36.5 12.8 36.5 8 Z' fill='#fff'/>
          <path class='spark small' d='M40 20 C40 24 41 25 45 25 C41 25 40 26 40 30 C40 26 39 25 35 25 C39 25 40 24 40 20 Z' fill='#fff' opacity='0.9'/>
        </svg>
        <span class='brand-lock'><span class='brand-title'><span class='m-hi'>MD</span><span class='m-rest'>ocify</span><span class='season'>md2docx</span></span></span>
      </span>
      <button id='btnOpenTop' title='다른 MD 파일 열기'>MD 파일 열기</button>
      <label class='mode-sw' title='템플릿'>템플릿
        <select id='tplSelect'>
          <option value='clean'>표준 (편집용)</option>
        </select>
      </label>
      <span class='spacer'></span>
      <button id='btnDocSettings' title='문서 설정 (색·폰트·크기)'>문서 설정</button>
      <label class='mode-sw' title='다크 모드'>다크<input type='checkbox' id='darkToggle'></label>
      <button id='btnSave' title='현재 내용을 .docx 로 저장'>Word로 저장 (.docx)</button>
      <input id='fileInput' type='file' accept='.md,.markdown,.txt' style='display:none'>
    </div>
    <div id='themeModal' hidden>
      <div class='tm-card'>
        <div class='tm-head'>
          <span class='tm-title'>문서 설정</span>
          <button class='tm-close' id='tmClose' title='닫기'>×</button>
        </div>
        <div id='tm-grid'></div>
        <div class='tm-custom' id='tmCustom'>
          <label for='tmColor'>직접 선택</label>
          <input type='color' id='tmColor' value='#2563eb'>
          <span class='sw' id='tmSw'></span>
          <span class='tm-hex' id='tmHex'>#2563EB</span>
          <button type='button' id='tmApply'>적용</button>
        </div>
        <div class='tm-fontsec'>
          <div class='tm-sec-head'>
            <span class='tm-sec-title'>폰트</span>
          </div>
          <div class='tm-font'>
            <label for='tmFont'>본문 폰트</label>
            <select id='tmFont'>
              <option value='malgun'>맑은 고딕</option>
              <option value='noto'>Noto Sans KR</option>
              <option value='nanum'>나눔고딕</option>
              <option value='batang'>바탕(명조)</option>
            </select>
          </div>
          <div class='tm-size'>
            <label for='tmSize'>기준 폰트 크기</label>
            <div class='tm-size-ctl'>
              <input type='range' id='tmSize' min='11' max='18' step='1' value='14'>
              <span class='tm-size-val' id='tmSizeVal'>14px</span>
            </div>
          </div>
        </div>
        <div class='tm-foot'>
          <div class='tm-foot-head'>
            <label for='tmHeader'>쪽 머리말(Header)</label>
            <input type='checkbox' id='tmHeader' class='tm-switch'>
          </div>
          <div class='tm-foot-body' id='tmHeaderBody'>
            <input type='text' id='tmHeaderText' placeholder='예: {title}'>
            <div class='tm-foot-vars'>사용 가능 변수: {pageNumber} , {totalPages} , {title}</div>
            <div class='tm-foot-row'>
              <label for='tmHeaderAlign'>정렬</label>
              <select id='tmHeaderAlign'>
                <option value='left'>왼쪽</option>
                <option value='center'>가운데</option>
                <option value='right'>오른쪽</option>
              </select>
            </div>
            <label class='tm-foot-border'><input type='checkbox' id='tmHeaderBorder'>구분선 표시</label>
          </div>
        </div>
        <div class='tm-foot'>
          <div class='tm-foot-head'>
            <label for='tmFooter'>쪽 바닥글(Footer)</label>
            <input type='checkbox' id='tmFooter' class='tm-switch'>
          </div>
          <div class='tm-foot-body' id='tmFooterBody'>
            <input type='text' id='tmFooterText' placeholder='예: Page {pageNumber} / {totalPages}'>
            <div class='tm-foot-vars'>사용 가능 변수: {pageNumber} , {totalPages}</div>
            <div class='tm-foot-row'>
              <label for='tmFooterAlign'>정렬</label>
              <select id='tmFooterAlign'>
                <option value='left'>왼쪽</option>
                <option value='center'>가운데</option>
                <option value='right'>오른쪽</option>
              </select>
            </div>
            <label class='tm-foot-border'><input type='checkbox' id='tmFooterBorder'>구분선 표시</label>
          </div>
        </div>
        <div class='tm-opts'>
          <div class='tm-opt'>
            <label for='tmRemember'>선택한 설정 기억하기</label>
            <input type='checkbox' id='tmRemember' class='tm-switch'>
          </div>
        </div>
      </div>
    </div>
    <div id='main'>
      <section class='pane' id='editorPane'>
        <textarea id='editor' spellcheck='false' placeholder='여기에 Markdown 을 입력하거나 .md 파일을 끌어다 놓으세요'></textarea>
        <button id='fileBadge' type='button' hidden title='불러온 파일 보기'><svg width='15' height='15' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true'><path d='M21 8.5l-9.2 9.2a4 4 0 0 1-5.7-5.7l8.5-8.5a2.5 2.5 0 0 1 3.5 3.5l-8.5 8.5a1 1 0 0 1-1.4-1.4l7.8-7.8'/></svg><span id='fileBadgeN'>0</span><span id='fileBadgeWarn' aria-hidden='true' title='식별 안 된 이미지가 있습니다'>!</span></button>
        <div id='filePop' hidden></div>
      </section>
      <div id='splitter'>
        <button id='foldBtn' type='button' title='편집창 접기/펼치기' aria-label='편집창 접기/펼치기'><span class='fold-ico'>‹</span></button>
      </div>
      <section class='pane' id='previewWrap'>
        <div class='pv-head' id='pvHead'>Total 0 pages</div>
        <div id='pages'></div>
      </section>
      <div id='drop'>
        <div class='drop-box'>
          <svg class='drop-ico' width='44' height='44' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round' aria-hidden='true'>
            <path d='M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2'/>
            <path d='M7 9l5 -5l5 5'/>
            <path d='M12 4l0 12'/>
          </svg>
          <h2>여기에 .md 파일을 끌어다 놓으세요</h2>
          <div class='sub'>또는 <b>MD 파일 열기</b> 로 선택하세요.</div>
          <div class='drop-note'>왼쪽에서 편집하고 오른쪽 미리보기로 확인한 뒤 <b>Word로 저장</b> 을 누르면 .docx 로 내려받습니다.</div>
          <div class='drop-actions'>
            <button id='btnOpen'>MD 파일 열기</button>
            <button id='btnBlank' class='ghost'>빈 문서로 시작</button>
          </div>
        </div>
      </div>
    </div>
    <div id='src'></div>
    <script src="js/app.js"></script>
  </body>
</html>
